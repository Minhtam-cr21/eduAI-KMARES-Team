# Gọi Edge Function hằng ngày (UTC) + deploy thủ công.
#
# GitHub → Settings → Secrets and variables → Actions, thêm:
#   SUPABASE_PROJECT_REF   (ví dụ abcdefghijklmnop)
#   SUPABASE_ANON_KEY      (Settings → API → anon public)
# Tuỳ chọn (chỉ khi dùng job deploy):
#   SUPABASE_ACCESS_TOKEN  (Account → Access Tokens)
#   SUPABASE_SERVICE_ROLE_KEY
#   RESEND_API_KEY
#   RESEND_FROM_EMAIL

name: Supabase handle-missed-deadlines

on:
  workflow_dispatch:
  schedule:
    # 02:00 UTC mỗi ngày (~9h sáng VN mùa không DST)
    - cron: "0 2 * * *"

jobs:
  invoke:
    name: POST handle-missed-deadlines
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Edge Function
        env:
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          # Trim CR/LF và khoảng trắng (thường gây curl: Bad hostname)
          REF="$(printf '%s' "$REF" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          ANON="$(printf '%s' "$ANON" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          # Bỏ ngoặc kép / nháy nếu người dùng dán cả vào secret
          REF="${REF%\"}"; REF="${REF#\"}"; REF="${REF%\'}"; REF="${REF#\'}"
          ANON="${ANON%\"}"; ANON="${ANON#\"}"; ANON="${ANON%\'}"; ANON="${ANON#\'}"
          # Nếu dán nhầm URL đầy đủ → chỉ lấy project ref
          REF="${REF#https://}"
          REF="${REF#http://}"
          REF="${REF%.supabase.co}"
          REF="${REF%.supabase.co/}"
          case "$REF" in
            *.supabase.co)
              REF="${REF%.supabase.co}"
              ;;
          esac
          REF="$(printf '%s' "$REF" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          test -n "$REF" && test -n "$ANON" || { echo "Thiếu secrets SUPABASE_PROJECT_REF hoặc SUPABASE_ANON_KEY"; exit 1; }
          # Chỉ chấp nhận Reference ID kiểu Supabase (chữ thường, số, gạch ngang; không / URL)
          if ! printf '%s' "$REF" | grep -qE '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'; then
            echo "::error::SUPABASE_PROJECT_REF không hợp lệ. Dán đúng Reference ID trong Dashboard (General), không dán URL."
            exit 1
          fi
          URL="https://${REF}.supabase.co/functions/v1/handle-missed-deadlines"
          echo "POST $URL"
          curl -sS -f -X POST "$URL" \
            -H "Authorization: Bearer ${ANON}" \
            -H "Content-Type: application/json" \
            -d '{}'
          echo ""

